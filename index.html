<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Izin Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Login Admin Modal -->
        <div id="adminModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2><i class="fas fa-lock"></i> Admin Panel</h2>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminPassword"><i class="fas fa-key"></i> Password Admin</label>
                        <input type="password" id="adminPassword" required>
                    </div>
                    <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
                </form>
            </div>
        </div>

        <header>
            <h1><i class="fas fa-calendar-check"></i> Sistem Izin Online</h1>
            <p>Ajukan izin sakit atau acara dengan mudah</p>
            <div class="header-actions">
                <button id="adminBtn" class="admin-btn">
                    <i class="fas fa-cog"></i> Admin
                </button>
            </div>
        </header>

        <!-- Form Pengajuan Izin -->
        <div id="userForm">
            <form id="izinForm" class="izin-form">
                <div class="form-group">
                    <label for="nama"><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" required>
                </div>

                <div class="form-group">
                    <label for="nip"><i class="fas fa-id-card"></i> NIP/NIS</label>
                    <input type="text" id="nip" name="nip" required>
                </div>

                <div class="form-group">
                    <label for="jenisIzin"><i class="fas fa-list"></i> Jenis Izin</label>
                    <select id="jenisIzin" name="jenisIzin" required>
                        <option value="">Pilih jenis izin</option>
                        <option value="sakit">Sakit</option>
                        <option value="acara">Acara/Kejadian Khusus</option>
                    </select>
                </div>

                <div class="form-group" id="alasanGroup">
                    <label for="alasan"><i class="fas fa-info-circle"></i> Alasan/Keterangan</label>
                    <textarea id="alasan" name="alasan" rows="4" placeholder="Jelaskan detail sakit atau acara..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="tanggal"><i class="fas fa-calendar"></i> Tanggal Izin</label>
                    <input type="date" id="tanggal" name="tanggal" required>
                </div>

                <div class="form-group">
                    <label for="kelas"><i class="fas fa-graduation-cap"></i> Kelas/Jabatan</label>
                    <input type="text" id="kelas" name="kelas" placeholder="Contoh: XII IPA 1 / Staff IT">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Kirim Izin
                </button>
            </form>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <div class="admin-header">
                <h2><i class="fas fa-user-shield"></i> Admin Panel</h2>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
            
            <div class="stats">
                <div class="stat-card pending">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3 id="pendingCount">0</h3>
                        <span>Menunggu</span>
                    </div>
                </div>
                <div class="stat-card approved">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <h3 id="approvedCount">0</h3>
                        <span>Disetujui</span>
                    </div>
                </div>
                <div class="stat-card rejected">
                    <i class="fas fa-times-circle"></i>
                    <div>
                        <h3 id="rejectedCount">0</h3>
                        <span>Ditolak</span>
                    </div>
                </div>
            </div>

            <div class="izin-list">
                <h3><i class="fas fa-list"></i> Daftar Pengajuan Izin</h3>
                <div id="izinList" class="list-container">
                    <!-- Izin akan dimuat di sini -->
                </div>
            </div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
