<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Izin Online - GHIYAST</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Login Admin Modal -->
        <div id="adminModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2><i class="fas fa-lock"></i> Admin Panel</h2>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminPassword"><i class="fas fa-key"></i> Password</label>
                        <input type="password" id="adminPassword" required>
                    </div>
                    <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt"></i> MASUK</button>
                </form>
            </div>
        </div>

        <header>
            <div class="logo">
                <i class="fas fa-calendar-check"></i>
                <h1>SISTEM IZIN</h1>
            </div>
            <div class="by-text">BY: GHIYAST</div>
            <button id="adminBtn" class="admin-btn">
                <i class="fas fa-cog"></i> ADMIN
            </button>
        </header>

        <!-- Form User -->
        <div id="userForm">
            <form id="izinForm" class="izin-form">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> NAMA</label>
                        <input type="text" id="nama" name="nama" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fas fa-list"></i> ALASAN IZIN</label>
                        <select id="jenisIzin" name="jenisIzin" required>
                            <option value="">Pilih alasan</option>
                            <option value="sakit">SAKIT</option>
                            <option value="acara">ACARA</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label><i class="fas fa-info-circle"></i> KETERANGAN</label>
                        <textarea id="alasan" name="alasan" rows="3" placeholder="Jelaskan detail..." required></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> TANGGAL</label>
                        <input type="date" id="tanggal" name="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-briefcase"></i> JABATAN</label>
                        <select id="jabatan" name="jabatan" required>
                            <option value="">Pilih jabatan</option>
                            <option value="petinggi">PETINGGI</option>
                            <option value="wakil">WAKIL</option>
                            <option value="management">MANAGEMENT</option>
                            <option value="staff">STAFF</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> KIRIM IZIN
                </button>
            </form>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <div class="admin-header">
                <h2><i class="fas fa-user-shield"></i> ADMIN PANEL</h2>
                <button id="logoutBtn" class="logout-btn">KELUAR</button>
            </div>
            
            <div class="stats">
                <div class="stat-card pending">
                    <i class="fas fa-clock"></i>
                    <div><h3 id="pendingCount">0</h3><span>Menunggu</span></div>
                </div>
                <div class="stat-card approved">
                    <i class="fas fa-check-circle"></i>
                    <div><h3 id="approvedCount">0</h3><span>Disetujui</span></div>
                </div>
                <div class="stat-card rejected">
                    <i class="fas fa-times-circle"></i>
                    <div><h3 id="rejectedCount">0</h3><span>Ditolak</span></div>
                </div>
            </div>

            <div class="izin-list">
                <h3><i class="fas fa-list"></i> DAFTAR IZIN</h3>
                <div id="izinList" class="list-container"></div>
            </div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

        <div id="status" class="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
